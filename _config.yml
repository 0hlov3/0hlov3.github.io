# Site settings
title: 0hlov3
description: >- # this means to ignore newlines until "baseurl:"
  Working as DevOps Engineer with a focus on Azure and GCP.
url: "https://maxxblow.de"
baseurl: "" # the subpath of your site, e.g. /blog
profilepic: '/images/0hlov3-avatar.jpg'
backgroundimage: '/images/0hlov3-background.jpeg'

author:
  name: '0hlov3'
  email: 0hlov3@protonmail.com
  twitter_username: 0hlov3s
  github_username:  0hlov3
  mastodon_username: 0hlov3
  pixelfed_username: Ohlov3
  reddit_username: 0hlov3s
  stackoverflow:
    username: 0hlov3
    userid: 12966958

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
kramdown:
  html_to_native: true
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
